apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-ingress
  namespace: voting-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # This group name merges these rules with other Ingresses
    alb.ingress.kubernetes.io/group.name: "voting-app-shared"
    alb.ingress.kubernetes.io/actions.result-rewrite: '{"type":"forward","forwardConfig":{"targetGroups":[{"serviceName":"result-service","servicePort":80}]},"rewriteConfig":{"path":"/"}}'
spec:
  ingressClassName: alb
  rules:
  - host: voting-cat.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vote-service
            port:
              number: 80