apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: master-ingress
  namespace: voting-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - host: voting-cat.com
    http:
      paths:
      - path: /results
        pathType: Prefix
        backend:
          service:
            name: result-service # Route directly to the service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vote-service
            port:
              number: 80
