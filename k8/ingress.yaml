apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-ingress
  namespace: voting-app
  annotations:
    # Use the AWS ALB Ingress Controller
    kubernetes.io/ingress.class: alb
    # Set the load balancer to be internet-facing
    alb.ingress.kubernetes.io/scheme: internet-facing
    # Use IP mode for faster, direct routing to pods
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      # Route root path to the voting frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vote-service
            port:
              number: 80
      # Route /results path to the results dashboard
      - path: /results
        pathType: Prefix
        backend:
          service:
            name: result-service
            port:
              number: 80