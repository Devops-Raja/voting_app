# ~/voting_app/worker/.gitlab-ci-worker.yml
stages:
  - test
  - build
  - deploy


variables:
  # Using your Docker Hub repository path
  DOCKER_HUB_REPO: "ram7800/worker"
  IMAGE_TAG: "$DOCKER_HUB_REPO:$CI_COMMIT_SHORT_SHA"
  LATEST_TAG: "$DOCKER_HUB_REPO:latest"

# ==========================================
# 1. TEST & COMPILATION STAGE
# ==========================================
test-worker:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  variables:
    # Disable the persistent background build server daemon inside the container
    DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
    MSBUILDDISABLENODEREUSE: "1"
    DOTNET_GC_HEAP_HARD_LIMIT: "1C0000000"
  script:
    - cd worker
    - dotnet restore --verbosity normal
    - dotnet build --no-restore --configuration Release

# ==========================================
# 2. BUILD STAGE (Pushes to Docker Hub)
# ==========================================
build-worker:
  stage: build
  image: docker:24.0.7
  services:
     - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
     - docker pull $LATEST_TAG || true
    # Build using the Dockerfile inside your /worker folder
     - docker build
        --network host
        --cache-from $LATEST_TAG 
        --build-arg BUILDKIT_INLINE_CACHE=1 
        -t $IMAGE_TAG 
        -t $LATEST_TAG ./worker
     - docker push $IMAGE_TAG
     - docker push $LATEST_TAG
     - echo "IMAGE_TAG=$IMAGE_TAG" > build.env
  artifacts:
    reports:
      dotenv: build.env
# ==========================================
deploy-worker:
  stage: deploy
  image: alpine:latest
  needs: ["build-worker"] # Ensures the  build artifact is available
  before_script:
    - apk add --no-cache git sed
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - REPO_URL="https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git remote set-url origin $REPO_URL
    - git fetch origin main
  # 1. Reset your local state to match the remote exactly
    - git checkout main
    - git reset --hard origin/main
    
    # Use the block scalar | to avoid syntax errors
    - |
      # Replace the image tag in your manifest
      sed -i "s|image: ram7800/worker:.*|image: $IMAGE_TAG|g" k8/backend/worker-deployment.yaml
      
      # Check if changes exist before pushing
      if [ -n "$(git status --porcelain)" ]; then
        git add k8/backend/worker-deployment.yaml
        git commit -m "CI: update worker image to $IMAGE_TAG [skip ci]"
        git push origin main HEAD:$CI_COMMIT_REF_NAME
      else
        echo "No changes needed."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"