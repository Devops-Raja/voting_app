
services:
  # 1. Redis Queue
  redis:
    image: redis:7-alpine
    container_name: voting-redis
    ports:
      - "6379:6379"
# Mount your local healthchecks directory inside the container
    volumes:
      - ./healthchecks:/usr/local/bin/healthchecks
    # Execute your specific script path natively
    healthcheck:
      test: ["CMD", "sh", "/usr/local/bin/healthchecks/redis.sh"]
      interval: 5s
      timeout: 3s
      retries: 3

  # 2. PostgreSQL Vault
  db:
    image: postgres:15-alpine
    container_name: voting-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      # Mount both database storage and your healthcheck script directory

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./healthchecks:/usr/local/bin/healthchecks
    ports:
      - "5432:5432"
    # Execute your specific script path natively
    healthcheck:
      test: ["CMD", "sh", "/usr/local/bin/healthchecks/postgres.sh"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      default:
        aliases:
          - postgres      

  # 3. Python Flask Frontend
  vote:
    build:
      context: ./vote
    container_name: voting-frontend
    ports:
      - "5000:80"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  # 4. .NET Background Processing Worker
  worker:
    build:
      context: ./worker
    container_name: voting-worker
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dummy_password
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  # 5. Node.js Dashboard Frontend
  result:
    build:
      context: ./result
    container_name: voting-results
    ports:
      - "5001:80"
    environment:
      - DB_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dummy_password
    depends_on:
      db:
        condition: service_healthy
# 6. Automated Vote Generator (Load Testing Tool)
  seed:
    build:
      context: ./seed-data
    container_name: voting-seed
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy


volumes:
  postgres-data: