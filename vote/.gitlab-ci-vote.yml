# ~/voting_app/vote/.gitlab-ci-vote.yml
stages:
  - test
  - build
  - deploy


variables:
  # Using your Docker Hub repository path instead of the GitLab registry
  DOCKER_HUB_REPO: "ram7800/vote"
  IMAGE_TAG: "$DOCKER_HUB_REPO:$CI_COMMIT_SHORT_SHA"
  LATEST_TAG: "$DOCKER_HUB_REPO:latest"

# ==========================================
# 1. TEST STAGE
# ==========================================
test-vote:
  stage: test
  image: python:3.11-slim
  allow_failure: true
  before_script:
    - cd vote
    - pip install -r requirements.txt
  script:
    - pip install flake8
    - flake8 --exclude=static,templates --max-line-length=120 . || true

# ==========================================
# 2. BUILD STAGE (Pushes to Docker Hub)
# ==========================================
build-vote:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Authenticating to Docker Hub using secure variables
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
    # Pull from Docker Hub to reuse cached layers
    - docker pull $LATEST_TAG || true
    # Build using the Dockerfile inside your /vote folder
    - docker build 
        --cache-from $LATEST_TAG 
        --build-arg BUILDKIT_INLINE_CACHE=1 
        -t $IMAGE_TAG 
        -t $LATEST_TAG ./vote
    # Push the immutable SHA tag and the latest tag to your repo
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG
    - echo "IMAGE_TAG=$IMAGE_TAG" > build.env
  artifacts:
    reports:
      dotenv: build.env
# ==========================================
# 3. DEPLOY STAGE
# ===========================================
deploy-vote:
  stage: deploy
  image: alpine:latest
  needs: ["build-vote"] # Ensures the build artifact is available
  before_script:
    - apk add --no-cache git sed
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - REPO_URL="https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git remote set-url origin $REPO_URL
    - git fetch origin main
    
    # 1. Force your local main to be an exact copy of the remote main
    - git checkout -B main origin/main
    
    # 2. Use the block scalar | for safe multi-line execution
    - |
      # Replace the image tag
      sed -i "s|image: ram7800/vote:.*|image: $IMAGE_TAG|g" k8/frontend/vote-deployment.yaml
      
      # Check if changes exist
      if [ -n "$(git status --porcelain)" ]; then
        git add k8/frontend/vote-deployment.yaml
        git commit -m "CI: update worker image to $IMAGE_TAG [skip ci]"
        # Push ONLY the main branch
        git push origin main
        echo "Successfully updated GitLab manifest."
      else
        echo "No changes needed, manifest is already up to date."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"