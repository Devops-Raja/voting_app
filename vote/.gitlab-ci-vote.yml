# ~/voting_app/vote/.gitlab-ci-vote.yml
stages:
  - test
  - build
  - deploy


variables:
  # Using your Docker Hub repository path instead of the GitLab registry
  DOCKER_HUB_REPO: "ram7800/vote"
  IMAGE_TAG: "$DOCKER_HUB_REPO:$CI_COMMIT_SHORT_SHA"
  LATEST_TAG: "$DOCKER_HUB_REPO:latest"

# ==========================================
# 1. TEST STAGE
# ==========================================
test-vote:
  stage: test
  image: python:3.11-slim
  allow_failure: true
  before_script:
    - cd vote
    - pip install -r requirements.txt
  script:
    - pip install flake8
    - flake8 --exclude=static,templates --max-line-length=120 . || true

# ==========================================
# 2. BUILD STAGE (Pushes to Docker Hub)
# ==========================================
build-vote:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Authenticating to Docker Hub using secure variables
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
    # Pull from Docker Hub to reuse cached layers
    - docker pull $LATEST_TAG || true
    # Build using the Dockerfile inside your /vote folder
    - docker build 
        --cache-from $LATEST_TAG 
        --build-arg BUILDKIT_INLINE_CACHE=1 
        -t $IMAGE_TAG 
        -t $LATEST_TAG ./vote
    # Push the immutable SHA tag and the latest tag to your repo
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG
# ==========================================
# 3. DEPLOY STAGE
# ==========================================
deploy-vote:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git sed
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - |
      REPO_URL="https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
      git remote set-url origin $REPO_URL
      # Update the image in the vote deployment file
      sed -i "s|image: ram7800/vote:.*|image: $IMAGE_TAG|g" k8/frontend/vote-deployment.yaml
      # Commit the change
      git add k8/frontend/vote-deployment.yaml
      git commit -m "CI: update vote image to $IMAGE_TAG [skip ci]"
      git push origin HEAD:$CI_COMMIT_REF_NAME
  rules:
    - if: $CI_COMMIT_BRANCH == "main"