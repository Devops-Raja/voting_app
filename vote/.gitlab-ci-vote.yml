# ~/voting_app/vote/.gitlab-ci-vote.yml
stages:
  - test
  - build


variables:
  # Using your Docker Hub repository path instead of the GitLab registry
  DOCKER_HUB_REPO: "ram7800/vote"
  IMAGE_TAG: "$DOCKER_HUB_REPO:$CI_COMMIT_SHORT_SHA"
  LATEST_TAG: "$DOCKER_HUB_REPO:latest"

# ==========================================
# 1. TEST STAGE
# ==========================================
test-vote:
  stage: test
  image: python:3.11-slim
  allow_failure: true 
  before_script:
    - cd vote
    - pip install -r requirements.txt
  script:
    - pip install flake8
    - flake8 --exclude=static,templates --max-line-length=120 .

# ==========================================
# 2. BUILD STAGE (Pushes to Docker Hub)
# ==========================================
build-vote:
  stage: build
  image: docker:24.0.7
  
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Authenticating to Docker Hub using secure variables
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
    # Pull from Docker Hub to reuse cached layers
    - docker pull $LATEST_TAG || true
    # Build using the Dockerfile inside your /vote folder
    - docker build 
        --cache-from $LATEST_TAG 
        --build-arg BUILDKIT_INLINE_CACHE=1 
        -t $IMAGE_TAG 
        -t $LATEST_TAG ./vote
    # Push the immutable SHA tag and the latest tag to your repo
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG

# ==========================================
# 3. DEPLOY STAGE
# ==========================================
