# ~/voting_app/vote/.gitlab-ci-vote.yml
stages:
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE/vote:$CI_COMMIT_SHORT_SHA
  LATEST_TAG: $CI_REGISTRY_IMAGE/vote:latest

# ==========================================
# 1. TEST STAGE
# ==========================================
test-vote:
  stage: test
  image: python:3.11-slim
  before_script:
    - cd vote
    - pip install -r requirements.txt
  script:
    # Run syntax/style checking (highly recommended for Python production code)
    - pip install flake8
    - flake8 --exclude=static,templates --max-line-length=120 .
    # If you have unit tests configured later, you can add 'pytest' here

# ==========================================
# 2. BUILD STAGE (Docker-in-Docker with Caching)
# ==========================================
build-vote:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Pull the last successful image to reuse cached layers and speed up the build
    - docker pull $LATEST_TAG || true
    - docker build 
        --cache-from $LATEST_TAG 
        --build-arg BUILDKIT_INLINE_CACHE=1 
        -t $IMAGE_TAG 
        -t $LATEST_TAG ./vote
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG

# ==========================================
# 3. DEPLOY STAGE
# ==========================================
deploy-vote:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying Vote service version $IMAGE_TAG to production..."
    # This acts as a placeholder. We will fill this out once your hosting platform is selected.
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH