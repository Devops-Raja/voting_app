stages:
  - test
  - build
  - deploy

variables:
  DOCKER_HUB_REPO: "ram7800/result"
  IMAGE_TAG: "$DOCKER_HUB_REPO:$CI_COMMIT_SHORT_SHA"
  LATEST_TAG: "$DOCKER_HUB_REPO:latest"

# 1. TEST: Validates code and installs dependencies
lint-result:
  stage: test
  image: node:20-alpine
  allow_failure: true
  script:
    - cd result
    - npm ci --prefer-offline

# 2. BUILD: Creates the Docker image and pushes it to Docker Hub
build-result:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
    - docker pull $LATEST_TAG || true
    - |
      docker build \
        --cache-from $LATEST_TAG \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t $IMAGE_TAG \
        -t $LATEST_TAG ./result
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG
    - echo "IMAGE_TAG=$IMAGE_TAG" > build.env
  artifacts:
    reports:
      dotenv: build.env
# 3. DEPLOY: Updates the K8s manifest and pushes the change back to the repo

# ==========================================
deploy-result:
  stage: deploy
  image: alpine:latest
  needs: ["build-result"] # Ensures the  build artifact is available
  before_script:
    - apk add --no-cache git sed
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - REPO_URL="https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git remote set-url origin $REPO_URL
    - git fetch origin main
    
    # 1. Force your local main to be an exact copy of the remote main
    - git checkout -B main origin/main
    
    # 2. Use the block scalar | for safe multi-line execution
    - |
      # Replace the image tag
      sed -i "s|image: ram7800/worker:.*|image: $IMAGE_TAG|g" k8/frontend/results-deployment.yaml
      
      # Check if changes exist
      if [ -n "$(git status --porcelain)" ]; then
        git add k8/frontend/results-deployment.yaml
        git commit -m "CI: update worker image to $IMAGE_TAG [skip ci]"
        # Push ONLY the main branch
        git push origin main
        echo "Successfully updated GitLab manifest."
      else
        echo "No changes needed, manifest is already up to date."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"