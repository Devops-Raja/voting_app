stages:
  - test
  - build
  - deploy

variables:
  DOCKER_HUB_REPO: "ram7800/result"
  IMAGE_TAG: "$DOCKER_HUB_REPO:$CI_COMMIT_SHORT_SHA"
  LATEST_TAG: "$DOCKER_HUB_REPO:latest"

lint-result:
  stage: test
  image: node:20-alpine
  allow_failure: true
  script:
    - cd result
    - npm ci --prefer-offline

build-result:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
    - docker pull $LATEST_TAG || true
    - docker build --cache-from $LATEST_TAG --build-arg BUILDKIT_INLINE_CACHE=1 -t $IMAGE_TAG -t $LATEST_TAG ./result
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG

deploy-manifest:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git sed
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - REPO_URL="https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git remote set-url origin $REPO_URL
    - sed -i "s|image: ram7800/result:.*|image: $IMAGE_TAG|g" k8/frontend/result-deployment.yml
    - git add k8/frontend/result-deployment.yml
    - git commit -m "CI: update result image to $IMAGE_TAG [skip ci]"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
    - apk add --no-cache kubectl
    - kubectl apply -f k8/frontend/result-deployment.yml
  rules:
    - if: $CI_COMMIT_BRANCH == "main"