# ~/voting_app/result/.gitlab-ci-results.yml
stages:
  - test
  - build
  - deploy

variables:
  # Targeting your specific Docker Hub repository
  DOCKER_HUB_REPO: "ram7800/result"
  IMAGE_TAG: "$DOCKER_HUB_REPO:$CI_COMMIT_SHORT_SHA"
  LATEST_TAG: "$DOCKER_HUB_REPO:latest"

# ==========================================
# 1. TEST / LINT STAGE
# ==========================================
lint-result:
  stage: test
  image: node:20-alpine
  allow_failure: true # Keeps pipeline moving even if formatting is imperfect
  script:
    - cd result
    # Installs the exact versions locked in your package-lock.json
    - npm ci --prefer-offline

# ==========================================
# 2. BUILD STAGE (Pushes to Docker Hub)
# ==========================================
build-result:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Uses the global Group-level credentials you configured
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
    - docker pull $LATEST_TAG || true
    # Build using the Dockerfile inside your /result folder
    - docker build 
        --cache-from $LATEST_TAG 
        --build-arg BUILDKIT_INLINE_CACHE=1 
        -t $IMAGE_TAG 
        -t $LATEST_TAG ./result
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG
# ==========================================
# 3. DEPLOY STAGE
# ==========================================
deploy-manifest:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git sed
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    # Use a variable to construct the remote URL to bypass colon parsing issues
    - REPO_URL="https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git remote set-url origin $REPO_URL
    
    # 1. Update the image tag
    - sed -i "s|image: ram7800/result:.*|image: $IMAGE_TAG|g" k8/frontend/result-deployment.yml
    
    # 2. Commit and push
    - git add k8/frontend/result-deployment.yml
    - git commit -m "CI: update result image to $IMAGE_TAG [skip ci]"
    - git push origin HEAD:$CI_COMMIT_REF_NAME
    
    # 3. Apply changes
    - apk add --no-cache kubectl
    - kubectl apply -f k8/frontend/result-deployment.yml
  only:
    - main